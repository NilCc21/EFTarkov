name: EFTarkov
version: '1.0.0'
main: io.Sriptirc_wp_1417.eftarkov.Eftarkov
api-version: '1.21'
folia-supported: true
authors: ['wp:1417']
description: '打怪获得金币插件，支持多世界配置，基于Vault经济'
depend: ['Vault']
commands:
    eftarkov:
        description: 'EFTarkov 插件主命令'
        aliases: ['et']
permissions:
    eftarkov.use:
        description: '允许打怪获得金币'
        default: false
    eftarkov.reload:
        description: '允许重载插件配置'
        default: false
    eftarkov.admin:
        description: '管理员权限'
        default: false
